<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>밸브 계통도 계산서</title>
<style>
:root{
  --bg:#0d1117;--surface:#161b22;--surface2:#21262d;--surface3:#2d333b;
  --border:#30363d;--accent:#58a6ff;--accent2:#3fb950;--warn:#d29922;
  --hot:#f78166;--red:#f85149;--purple:#bc8cff;--text:#e6edf3;--text2:#8b949e;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font:14px/1.5 'Malgun Gothic','Apple SD Gothic Neo',sans-serif;min-height:100vh}
header{position:sticky;top:0;z-index:100;background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;gap:12px;height:52px}
.logo{color:var(--accent);font-weight:700;font-size:15px;white-space:nowrap}
#projectName{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:5px 10px;border-radius:6px;font-size:13px;width:180px;font-family:inherit}
#projectName:focus{outline:none;border-color:var(--accent)}
.hbtns{margin-left:auto;display:flex;gap:8px;flex-wrap:wrap}
.tabs-bar{display:flex;border-bottom:1px solid var(--border);background:var(--surface);overflow-x:auto;padding:0 16px}
.tab-btn{padding:12px 20px;cursor:pointer;color:var(--text2);border:none;border-bottom:2px solid transparent;font-size:13px;white-space:nowrap;transition:all .15s;background:none;font-family:inherit}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-btn:hover:not(.active){color:var(--text)}
.tab-pane{display:none;min-height:calc(100vh - 104px)}
.tab-pane.active{display:block}
.btn{padding:6px 14px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-family:inherit;transition:opacity .15s;white-space:nowrap}
.btn:hover{opacity:.82}
.btn-primary{background:var(--accent);color:#fff}
.btn-danger{background:var(--red);color:#fff}
.btn-success{background:var(--accent2);color:#0d1117}
.btn-warn{background:var(--warn);color:#0d1117}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-sm{padding:3px 8px;font-size:11px}
.badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:600}
.section{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:12px}
.section-title{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;font-weight:700}
.form-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.form-label{font-size:12px;color:var(--text2);width:130px;flex-shrink:0}
.form-inp{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:5px 9px;border-radius:5px;font-size:13px;font-family:inherit;width:120px}
.form-inp:focus{outline:none;border-color:var(--accent)}
.form-inp.sm{width:80px}
select{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:5px 8px;border-radius:5px;font-family:inherit;font-size:12px}
select:focus{outline:none;border-color:var(--accent)}
.system-cards{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.sys-card{flex:1;min-width:200px;background:var(--surface2);border:2px solid var(--border);border-radius:8px;padding:14px 16px;cursor:pointer;transition:all .15s}
.sys-card.active{border-color:var(--accent);background:rgba(88,166,255,.08)}
.sys-card-title{font-size:14px;font-weight:700;margin-bottom:4px}
.sys-card-desc{font-size:11px;color:var(--text2)}
.group-card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:10px}
.group-hdr{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.group-name-inp{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:4px;font-size:13px;font-family:inherit;font-weight:600;width:130px}
.group-name-inp:focus{outline:none;border-color:var(--accent)}
.pressure-badge{font-size:11px;padding:3px 8px;border-radius:4px;font-weight:600}
.zone-list{display:flex;flex-direction:column;gap:6px;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.zone-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.zone-inp{background:var(--surface3);border:1px solid var(--border);color:var(--text);padding:3px 7px;border-radius:4px;font-size:12px;font-family:inherit;width:110px}
.zone-inp:focus{outline:none;border-color:var(--accent)}
.prv-check{display:flex;align-items:center;gap:5px;font-size:12px;cursor:pointer;user-select:none}
.prv-check input{accent-color:var(--warn)}
.warn-chip{background:rgba(210,153,34,.15);border:1px solid rgba(210,153,34,.4);color:var(--warn);font-size:11px;padding:2px 8px;border-radius:4px;font-weight:600}
.ok-chip{background:rgba(63,185,80,.15);border:1px solid rgba(63,185,80,.4);color:var(--accent2);font-size:11px;padding:2px 8px;border-radius:4px;font-weight:600}
.floor-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}
.floor-table th{background:var(--surface3);padding:6px 10px;text-align:left;color:var(--text2);font-weight:600;border-bottom:1px solid var(--border)}
.floor-table td{padding:6px 10px;border-bottom:1px solid var(--border)}
.floor-table tr:last-child td{border-bottom:none}
.floor-warn td{background:rgba(210,153,34,.08)}
.valve-summary-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;margin-bottom:16px}
.vscard{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center}
.vscard-name{font-size:11px;color:var(--text2);margin-bottom:6px}
.vscard-count{font-size:26px;font-weight:700}
.vscard-unit{font-size:11px;color:var(--text2)}
.vscard-detail{font-size:10px;color:var(--text2);margin-top:7px;padding-top:6px;border-top:1px solid var(--border);line-height:1.6;word-break:keep-all}
table.vlist{width:100%;border-collapse:collapse;font-size:12px}
table.vlist th{background:var(--surface3);padding:8px 10px;text-align:left;color:var(--text2);font-weight:600;border-bottom:1px solid var(--border)}
table.vlist td{padding:7px 10px;border-bottom:1px solid var(--border)}
table.vlist tr:last-child td{border-bottom:none}
table.vlist tr:hover td{background:rgba(255,255,255,.02)}
.guide-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;overflow:hidden}
.guide-hdr{padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:10px;user-select:none}
.guide-hdr:hover{background:var(--surface2)}
.guide-icon{width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.guide-title{font-weight:700;font-size:13px}
.guide-badge{font-size:10px;padding:2px 7px;border-radius:3px}
.guide-body{padding:0 16px 14px;display:none}
.guide-body.open{display:block}
.guide-body p{font-size:12px;color:var(--text2);margin-bottom:8px;line-height:1.6}
.guide-tip{background:rgba(88,166,255,.08);border-left:3px solid var(--accent);padding:8px 12px;border-radius:0 6px 6px 0;font-size:12px;color:var(--text);margin-top:10px}
.guide-tip strong{color:var(--accent)}
.warn-banner{background:rgba(210,153,34,.12);border:1px solid rgba(210,153,34,.4);border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:12px;color:var(--warn)}
.svg-scroll{overflow:auto;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;display:flex;align-items:center;justify-content:center}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;width:320px}
.modal-title{font-size:15px;font-weight:700;margin-bottom:14px}
.modal-inp{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:6px;font-size:14px;font-family:inherit;margin-bottom:12px}
.modal-inp:focus{outline:none;border-color:var(--accent)}
.modal-btns{display:flex;gap:8px;justify-content:flex-end}
.page{padding:16px;max-width:1100px}
.fr{display:flex;align-items:center;gap:8px}
.mb{margin-bottom:8px}
.ml{margin-left:auto}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.bad-chip{background:rgba(248,81,73,.15);border:1px solid rgba(248,81,73,.4);color:var(--red);font-size:11px;padding:2px 8px;border-radius:4px;font-weight:600}
.floor-low td{background:rgba(248,81,73,.08)}
.print-only{display:none}
@media print{
  :root{
    --bg:#fff;--surface:#fff;--surface2:#f2f4f7;--surface3:#e9edf1;
    --border:#c8cdd3;--accent:#0757ba;--accent2:#116329;--warn:#7a5901;
    --hot:#bc4c00;--red:#a40e26;--purple:#6639ba;--text:#1f2328;--text2:#57606a;
  }
  header,.tabs-bar,#tabH{display:none!important}
  .print-only{display:block}
  .tab-pane{display:block!important;min-height:auto!important;page-break-after:always}
  body{background:#fff;color:#000}
  .guide-body{display:block!important}
  .svg-scroll{overflow:visible;border:none;padding:0}
  .svg-scroll svg{width:100%!important;height:auto!important;min-width:0!important}
  .warn-chip{color:#7a5901;border-color:#7a5901}
  .ok-chip{color:#116329;border-color:#116329}
  .bad-chip{color:#a40e26;border-color:#a40e26}
}
</style>
</head>
<body>
<header>
  <span class="logo">🔧 밸브 계통도 계산서</span>
  <input id="projectName" type="text" placeholder="프로젝트명">
  <div class="hbtns">
    <button class="btn btn-ghost" onclick="window.print()">🖨 PDF</button>
    <button class="btn btn-success" onclick="saveJSON()">💾 저장</button>
    <button class="btn btn-ghost" onclick="exportCSV()">📊 엑셀</button>
    <label class="btn btn-ghost" style="cursor:pointer">📂 불러오기<input type="file" accept=".json" style="display:none" onchange="loadJSON(event)"></label>
    <label class="btn btn-warn" style="cursor:pointer">🔗 급수앱 연동<input type="file" accept=".json" style="display:none" onchange="loadWaterApp(event)"></label>
    <button class="btn btn-danger" onclick="resetAll()">🔄 초기화</button>
  </div>
</header>
<div class="tabs-bar">
  <button class="tab-btn active" onclick="switchTab(0)">📖 사용법</button>
  <button class="tab-btn" onclick="switchTab(1)">① 계통 설정</button>
  <button class="tab-btn" onclick="switchTab(2)">② 계통도</button>
  <button class="tab-btn" onclick="switchTab(3)">③ 밸브 목록</button>
  <button class="tab-btn" onclick="switchTab(4)">④ 밸브 가이드</button>
</div>
<div id="printHeader" class="print-only" style="padding:16px 16px 0"></div>
<div class="tab-pane active" id="tabH"><div class="page" id="helpPanel"></div></div>
<div class="tab-pane" id="tab0"><div class="page" id="settingsPanel"></div></div>
<div class="tab-pane" id="tab1"><div class="page" id="diagramPanel"></div></div>
<div class="tab-pane" id="tab2"><div class="page" id="valvePanel"></div></div>
<div class="tab-pane" id="tab3"><div class="page" id="guidePanel"></div></div>
<div id="modalOverlay" class="modal-overlay" style="display:none"></div>

<script>
// ── Constants ────────────────────────────────────────────────────────────────
const PIPES=['15A','20A','25A','32A','40A','50A','65A','80A','100A','125A','150A'];
let _id=1; const uid=()=>'g'+(++_id);
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

// ── State ────────────────────────────────────────────────────────────────────
const S={
  projectName:'새 프로젝트',
  system:'booster',
  material:'sts',
  mr:mrDefaults(),
  pump:{count:2,pressure:7,flow:300,mainPipe:'100A',pumpPipe:'65A',inletPipe:'50A',mrLen:8},
  building:{floors:5,floorHeight:3.5,targetPressure:3.0,prvPressure:2.5,tankHeight:3},
  groups:[]
};
let activeTab=0;

// ── Calc ─────────────────────────────────────────────────────────────────────
const MIN_PRESSURE=0.7; // 일반 수전 최소 필요압 kgf/cm² (세정밸브는 1.0)
function floorPressure(floor){
  const B=S.building;
  if(S.system==='gravity'){
    // 고가수조식: 수조 저수위 기준 정수두 (최상층이 최저압)
    const head=(B.floors-floor)*B.floorHeight+(+B.tankHeight||0);
    return head*0.1;
  }
  // 부스터식: 펌프(1층 바닥 기준) 토출압 − 해당 층까지 정수두
  return S.pump.pressure-(floor-1)*B.floorHeight*0.1;
}
function needsPRV(floor){
  return floorPressure(floor) > S.building.targetPressure;
}
function groupMaxPressure(g){
  // 담당 층범위가 지정된 입상관의 최대 압력(범위 내 최저층 기준)
  if(!g.fromFloor&&!g.toFloor) return null;
  const a=+g.fromFloor||+g.toFloor, b=+g.toFloor||+g.fromFloor;
  const lo=Math.max(1,Math.min(S.building.floors,Math.min(a,b)));
  return floorPressure(lo);
}

// ── 마찰손실 (Hazen-Williams, STS C=150) ────────────────────────────────────
const DIA={'15A':.016,'20A':.021,'25A':.027,'32A':.036,'40A':.041,'50A':.053,'65A':.066,'80A':.078,'100A':.102,'125A':.127,'150A':.151};
// 밸브 L/D 상당길이 계수 (완전개방 기준)
const LDV={'볼밸브':3,'게이트밸브':8,'체크밸브':135,'Y형 스트레이너':250,'글로브밸브':340,'유량계':45};
function hwR(QLpm,Dm){ // 단위 마찰손실 (m/m)
  const Q=QLpm/60000; // m³/s
  return 10.666*Math.pow(Q,1.85)/(Math.pow(150,1.85)*Math.pow(Dm,4.87));
}
function groupFriction(g){
  const B=S.building,P=S.pump;
  const Q=+g.flowLpm||0;
  if(!Q) return null;
  const D=DIA[g.pipe]||.053;
  const hi=Math.max(+g.fromFloor||0,+g.toFloor||0)||B.floors;
  const Lv=Math.max(0,(hi-1)*B.floorHeight); // 수직: 담당층 자동
  const Lh=+g.horizLen||0;
  // 경로상 밸브 상당길이: 분기BV + 층별주관BV + 화장실BV (+PRV 전 GV×2, 스트레이너)
  let ld=LDV['볼밸브']*3;
  if(g.prv) ld+=LDV['게이트밸브']*2+LDV['Y형 스트레이너'];
  const Le=ld*D;
  const Lfit=0.2*(Lv+Lh); // 엘보·티 개산(직관장 20%)
  const hf=hwR(Q,D)*(Lv+Lh+Le+Lfit); // m
  // 기계실 구간(부스터·비PRV만 — PRV는 2차압으로 리셋되므로 이전 손실 무관)
  let hfMr=0;
  if(S.system==='booster'&&!g.prv){
    const Dm=DIA[P.mainPipe]||.102;
    const LeM=(LDV['체크밸브']+LDV['게이트밸브']+LDV['유량계'])*Dm;
    const Lm=+P.mrLen||8;
    hfMr=hwR(+P.flow||0,Dm)*(Lm*1.2+LeM);
  }
  let endP;
  if(S.system==='gravity') endP=floorPressure(hi)-hf/10;
  else if(g.prv) endP=B.prvPressure-(hi-1)*B.floorHeight*0.1-hf/10;
  else endP=P.pressure-(hi-1)*B.floorHeight*0.1-(hf+hfMr)/10;
  return {Q,hi,Lv,Lh,Le,Lfit,hf:hf/10,hfMr:hfMr/10,endP};
}

// ── 기계실 물량 (개산) — TP: 감압밸브 세트 출구까지 ─────────────────────────
function mrDefaults(){
  return {inletLen:10,lcvBypLen:3,suctionLen:4,dischargeLen:2,emerBypLen:6,prvSetLen:2,elbowK:0.4,teeK:0.15,insul:'고무발포 25T'};
}
function calcMR(){
  const P=S.pump, M=S.mr||{};
  const isBst=S.system==='booster';
  const segs=[];
  const add=(name,pipe,len,note='')=>{if(len>0)segs.push({name,pipe,len:Math.round(len*10)/10,note});};
  add('수도 인입관',P.inletPipe||'50A',+M.inletLen||0);
  if(isBst){
    add('LCV 바이패스',P.inletPipe||'50A',+M.lcvBypLen||0,'평상시 닫힘');
    add('펌프 흡입 배관',P.pumpPipe||'65A',(+M.suctionLen||0)*P.count,`${M.suctionLen}m × ${P.count}대`);
    add('펌프 토출 배관',P.pumpPipe||'65A',(+M.dischargeLen||0)*P.count,`${M.dischargeLen}m × ${P.count}대`);
    add('토출 헤더·메인(분기까지)',P.mainPipe,+P.mrLen||0);
    add('비상 바이패스(시수직결)',P.inletPipe||'50A',+M.emerBypLen||0,'평상시 닫힘');
  } else {
    add('수조 출구·메인(분기까지)',P.mainPipe,+P.mrLen||0);
  }
  // PRV 세트 배관 — 구경별 집계
  const prvByPipe={};
  for(const g of S.groups) if(g.prv) prvByPipe[g.pipe]=(prvByPipe[g.pipe]||0)+1;
  for(const [pipe,n] of Object.entries(prvByPipe))
    add('PRV 세트 배관',pipe,(+M.prvSetLen||0)*n,`${M.prvSetLen}m × ${n}개소`);
  const eK=+M.elbowK||0, tK=+M.teeK||0;
  const items=segs.map(s=>({...s,elbow:Math.ceil(s.len*eK),tee:Math.ceil(s.len*tK)}));
  return {items,reducer:isBst?P.count*2:0,eK,tK,insul:M.insul||'고무발포 25T'};
}
function pipeSpecLabel(){
  return S.material==='general'?'아연도강관(KS D 3507)':'STS304 (KS D 3576)';
}
function setMR(k,v){
  if(!S.mr)S.mr={};
  if(k!=='insul'){v=+v;if(!isFinite(v)||v<0)v=0;}
  S.mr[k]=v;renderAll();
}

// ── 재질/등급 자동 산정 ─────────────────────────────────────────────────────
// 소구경(≤50A) 나사·프레스식 / 대구경(≥65A) 플랜지·그루브드식 기준
function valveMat(name,pipe){
  const preset=S.material||'sts';
  const rating=(S.system==='booster'&&S.pump.pressure>=10)?'16K':'10K';
  const big=PIPES.indexOf(pipe)>=PIPES.indexOf('65A');
  const smallBody=preset==='general'?`청동 나사식 ${rating}`:`STS304 나사식 ${rating}`;
  const bigBody=preset==='allsts'?`STS304 플랜지식 ${rating}`:`덕타일주철(STS 디스크) 플랜지식 ${rating}`;
  switch(name){
    case '게이트밸브': case '볼밸브': case '글로브밸브': case 'Y형 스트레이너':
      return big?bigBody:smallBody;
    case '체크밸브':
      return big?`주철 스모렌스키 ${rating}`:(preset==='general'?`청동 스윙식 ${rating}`:`STS304 스윙식 ${rating}`);
    case '감압밸브':
      return preset==='allsts'?`STS 파일럿식 ${rating}`:`주철 파일럿식 ${rating}`;
    case '수위조절밸브(LCV)':
      return big?`주철 플랜지식 ${rating}`:`청동/STS ${rating}`;
    case '공기빼기밸브': return '청동/STS 자동식(플로트형)';
    case '배수밸브': return preset==='general'?'청동 나사식':'STS304 나사식';
    case '볼탭': return '청동';
    case '신축이음': return 'STS 벨로우즈형';
    case '플렉시블조인트': return 'STS 벨로우즈형';
    case '수격방지기': return 'STS 다이어프램식';
    case '압력탱크': return '다이어프램식(질소충전)';
    case '압력계': return 'STS 케이스, 글리세린 충입';
    default: return '-';
  }
}

function calcValves(){
  const P=S.pump, B=S.building, G=S.groups;
  const isBst=S.system==='booster';
  const inletPipe=P.inletPipe||'50A';
  const pumpPipe=P.pumpPipe||'65A';
  const list=[];
  let no=1;
  function add(pos,name,spec,pipe,qty,note=''){list.push({no:no++,pos,name,spec,pipe,qty,note,mat:valveMat(name,pipe)});}

  if(isBst){
    add('수도 인입부','게이트밸브','게이트밸브(인입차단)',inletPipe,1,'수도계량기 직후');
    add('수도 인입부','체크밸브','체크밸브(역류방지)',inletPipe,1,'저수조 입구 전');
    add('수도 인입부','Y형 스트레이너','Y형 스트레이너(LCV 보호)',inletPipe,1,'LCV 전단 — 파일럿·시트 이물질 보호');
    add('수도 인입부','수위조절밸브(LCV)','수위조절밸브(전동식)',inletPipe,1,'저수조 인입 LCV – 수위 차면 자동 차단');
    add('수도 인입부','게이트밸브','게이트밸브(LCV 전·후 차단)',inletPipe,2,'LCV 교체·점검 시 격리용');
    add('수도 인입부','게이트밸브','게이트밸브(LCV 바이패스)',inletPipe,1,'평상시 닫힘 — LCV 정비 중 급수 유지');
    add('저수조 내부','볼탭','볼탭(기계식 보조)','25A',1,'LCV 고장 시 2차 수위 조절');
    add('저수조 하부','배수밸브','배수밸브(청소용)','50A',1,'저수조 청소·배수용');
    add('저수조 출구','게이트밸브','게이트밸브(출구공통)',pumpPipe,1,'저수조 출구');
    add('펌프 흡입측','게이트밸브','게이트밸브',pumpPipe,P.count,`×${P.count}대`);
    add('펌프 흡입측','Y형 스트레이너','Y형 스트레이너',pumpPipe,P.count,`×${P.count}대`);
    add('펌프 흡입측','플렉시블조인트','플렉시블조인트(흡입·펌프 직근)',pumpPipe,P.count,`×${P.count}대`);
    add('펌프 토출측','플렉시블조인트','플렉시블조인트(토출·펌프 직근)',pumpPipe,P.count,`×${P.count}대`);
    add('펌프 토출측','체크밸브','체크밸브',pumpPipe,P.count,`×${P.count}대 – 게이트밸브 안쪽(펌프측)`);
    add('펌프 토출측','게이트밸브','게이트밸브',pumpPipe,P.count,`×${P.count}대 – 체크밸브 점검용 차단`);
    add('토출 헤더','압력계','압력계',P.mainPipe,1,'');
    add('토출 헤더','압력탱크','압력탱크(다이어프램)',P.mainPipe,1,'펌프 빈번 기동 방지·압력 안정');
    add('토출 헤더','수격방지기','수격방지기',P.mainPipe,1,'');
    add('비상 바이패스','게이트밸브','게이트밸브(시수직결 비상급수)',inletPipe,2,'시수 인입관→토출 주관 직결, 평상시 닫힘');
    add('비상 바이패스','체크밸브','체크밸브(역류방지)',inletPipe,1,'시수→토출 방향만 허용 — 펌프수 역가압 방지');
  } else {
    add('고가수조 인입','게이트밸브','게이트밸브(인입차단)',inletPipe,1,'');
    add('고가수조 인입','체크밸브','체크밸브(역류방지)',inletPipe,1,'');
    add('고가수조 내부','볼탭','볼탭','25A',1,'수위 조절');
    add('고가수조 하부','배수밸브','배수밸브(청소용)','50A',1,'수조 청소·배수용');
    add('고가수조 출구','게이트밸브','게이트밸브(출구공통)',P.mainPipe,1,'');
  }

  add('메인 수직관','게이트밸브','게이트밸브(유량계 전·후)',P.mainPipe,2,'유량계 교체용 차단');
  add('메인 수직관','유량계','유량계',P.mainPipe,1,'전·후 차단밸브 사이 설치');
  add('메인 수직관 최상부','공기빼기밸브','자동공기빼기밸브','15A',1,'');
  add('메인 수직관 최하부','배수밸브','배수밸브','25A',1,'');
  const exCnt=Math.max(1,Math.ceil((+B.floors||1)/3));
  add('메인 수직관','신축이음','벨로우즈형 신축이음',P.mainPipe,exCnt,`${B.floors}층÷3=${exCnt}개`);

  for(const g of G){
    add(`${g.name} 분기`,'볼밸브','볼밸브(입상관 차단)',g.pipe,1,'메인 분기');
    if(g.prv){
      add(`${g.name} PRV 입구`,'게이트밸브','게이트밸브(입구차단)',g.pipe,1,'PRV 입구');
      add(`${g.name} PRV`,'Y형 스트레이너','Y형 스트레이너(시트보호)',g.pipe,1,'감압밸브 전');
      add(`${g.name} PRV`,'압력계','압력계(1차압)',g.pipe,1,'PRV 전');
      add(`${g.name} PRV`,'감압밸브',`감압밸브(PRV)`,g.pipe,1,`설정압 ${B.prvPressure}kgf/cm²`);
      add(`${g.name} PRV`,'압력계','압력계(2차압)',g.pipe,1,'PRV 후');
      add(`${g.name} PRV 출구`,'게이트밸브','게이트밸브(출구차단)',g.pipe,1,'PRV 출구');
      add(`${g.name} 바이패스`,'게이트밸브','게이트밸브(바이패스)',g.pipe,2,'바이패스 전·후');
      add(`${g.name} 바이패스`,'글로브밸브','글로브밸브(유량조절)',g.pipe,1,'바이패스 조절');
    }
    add(`${g.name} 최상부`,'공기빼기밸브','자동공기빼기밸브','15A',1,'입상관 최상부');
    add(`${g.name} 최하부`,'배수밸브','배수밸브','25A',1,'입상관 최하부');
    for(const fp of (g.floorPipes||[])){
      add(`${g.name} ${fp.floorNo}층 주관`,'볼밸브',`볼밸브(${fp.floorNo}층 주관 차단)`,fp.pipe||g.pipe,+fp.qty||1,'층별 주관');
    }
    for(const z of g.zones){
      add(`${g.name} > ${z.name}`,'볼밸브','볼밸브(화장실 차단)',z.pipe,1,'화장실 차단');
    }
  }

  // Summary
  const names=['게이트밸브','볼밸브','체크밸브','감압밸브','글로브밸브','Y형 스트레이너',
    '공기빼기밸브','배수밸브','압력계','압력탱크','수격방지기','신축이음','플렉시블조인트','유량계','볼탭','수위조절밸브(LCV)'];
  const summary={};
  for(const n of names) summary[n]=0;
  for(const item of list) summary[item.name]=(summary[item.name]||0)+item.qty;
  return {list,summary};
}

function switchTab(i){
  activeTab=i;
  document.querySelectorAll('.tab-btn').forEach((b,j)=>b.classList.toggle('active',i===j));
  document.querySelectorAll('.tab-pane').forEach((p,j)=>p.classList.toggle('active',i===j));
  renderTab(i);
}
function renderTab(i){
  if(i===0) renderHelp();
  if(i===1) renderSettings();
  if(i===2) renderDiagram();
  if(i===3) renderValveList();
  if(i===4) renderGuide();
}
function renderAll(){persist();renderTab(activeTab);}

    h+=`<div class="form-row">
      <span class="form-label">수조 저수위 높이 (m)</span>
      <input class="form-inp sm" type="number" step="0.5" value="${B.tankHeight??3}" onchange="setBuilding('tankHeight',+this.value)">
      <span style="font-size:11px;color:var(--text2)">최상층 지붕(옥상 바닥) 기준 수조 저수위까지 높이</span>
    </div>`;
  }
  h+=`<div class="form-row">
      <span class="form-label">메인관 관경</span>
      <select onchange="setPump('mainPipe',this.value)">
        ${PIPES.map(p=>`<option${p===P.mainPipe?' selected':''}>${p}</option>`).join('')}
      </select>
    </div>
    <div class="form-row">
      <span class="form-label">수도 인입관 관경</span>
      <select onchange="setPump('inletPipe',this.value)">
        ${['25A','32A','40A','50A','65A','80A'].map(p=>`<option${p===(P.inletPipe||'50A')?' selected':''}>${p}</option>`).join('')}
      </select>
    </div>
  </div>`;

  // Building
  h+=`<div class="section">
    <div class="section-title">건물 정보</div>
    <div class="form-row">
      <span class="form-label">총 층수</span>
      <input class="form-inp sm" type="number" value="${B.floors}" onchange="setBuilding('floors',+this.value)">
    </div>
    <div class="form-row">
      <span class="form-label">층고 (m)</span>
      <input class="form-inp sm" type="number" step="0.1" value="${B.floorHeight}" onchange="setBuilding('floorHeight',+this.value)">
    </div>
    <div class="form-row">
      <span class="form-label">적정 급수압 (kgf/cm²)</span>
      <input class="form-inp sm" type="number" step="0.1" value="${B.targetPressure}" onchange="setBuilding('targetPressure',+this.value)">
    </div>
    <div class="form-row">
      <span class="form-label">감압밸브 설정압 (kgf/cm²)</span>
      <input class="form-inp sm" type="number" step="0.1" value="${B.prvPressure}" onchange="setBuilding('prvPressure',+this.value)">
    </div>
  </div>`;

  // Material preset
  const rating=(S.system==='booster'&&S.pump.pressure>=10)?'16K':'10K';
  h+=`<div class="section">
    <div class="section-title">밸브 재질 사양</div>
    <div class="form-row">
      <span class="form-label">재질 프리셋</span>
      <select onchange="setMaterial(this.value)" style="max-width:100%">
        <option value="sts"${(S.material||'sts')==='sts'?' selected':''}>STS 표준 — 소구경 STS304 나사식 / 대구경 덕타일주철+STS디스크 (권장)</option>
        <option value="allsts"${S.material==='allsts'?' selected':''}>전체 STS — 전 구경 STS304 (고급 사양)</option>
        <option value="general"${S.material==='general'?' selected':''}>일반 — 소구경 청동 / 대구경 주철</option>
      </select>
    </div>
    <div style="font-size:11px;color:var(--text2)">
      ※ 밸브 목록의 재질/등급 컬럼에 자동 반영됩니다. 소구경(50A 이하) 나사·프레스식, 대구경(65A 이상) 플랜지·그루브드식 기준.<br>
      ※ 압력등급 현재 <strong style="color:var(--accent)">${rating}</strong> — 펌프 토출압 10kgf/cm² 이상이면 16K 자동 적용.
    </div>
  </div>`;

  // Floor pressure table
  const p1=floorPressure(1);
  if(B.prvPressure>0&&p1/B.prvPressure>3){
    h+=`<div class="warn-banner">⚠️ 감압비 ${(p1/B.prvPressure).toFixed(1)} : 1 — 3:1 초과 시 PRV 소음·캐비테이션 우려, 2단 감압(직렬 PRV) 검토가 필요합니다.</div>`;
  }
  if(B.prvPressure>B.targetPressure){
    h+=`<div class="warn-banner">⚠️ 감압밸브 설정압(${B.prvPressure})이 적정 급수압(${B.targetPressure})보다 높습니다. 설정압을 확인하세요.</div>`;
  }
  h+=`<div class="section">
    <div class="section-title">층별 압력 계산 ${S.system==='gravity'?'(고가수조 정수두 기준)':'(펌프 토출압 기준)'}</div>
    <table class="floor-table"><thead><tr>
      <th>층</th><th>압력 (kgf/cm²)</th><th>상태</th>
    </tr></thead><tbody>`;
  for(let f=1;f<=B.floors;f++){
    const p=floorPressure(f), over=p>B.targetPressure, low=p<MIN_PRESSURE;
    h+=`<tr${over?' class="floor-warn"':low?' class="floor-low"':''}>
      <td>${f}층</td><td>${p.toFixed(2)}</td>
      <td>${over?`<span class="warn-chip">감압필요 ▶ PRV</span>`:low?`<span class="bad-chip">압력부족 (${MIN_PRESSURE} 미만)</span>`:`<span class="ok-chip">적정</span>`}</td>
    </tr>`;
  }
  h+=`</tbody></table>
    <div style="font-size:11px;color:var(--text2);margin-top:8px">
      ※ 정수두만 반영한 값이며 배관 마찰손실은 별도입니다. 최소 필요압 ${MIN_PRESSURE}kgf/cm² 기준(세정밸브 사용 시 1.0 이상 확보).
      ${S.system==='gravity'?'<br>※ 고가수조식은 최상층부 압력 부족 시 최상층 전용 가압펌프(부스터) 설치를 검토하세요.':''}
    </div></div>`;

  // Groups
  h+=`<div class="section">
    <div class="fr mb">
      <span class="section-title" style="margin:0">입상관 / Zone 설정</span>
      <button class="btn btn-primary btn-sm ml" onclick="addGroup()">+ 입상관 추가</button>
    </div>`;
  if(!S.groups.length) h+=`<div style="color:var(--text2);font-size:13px;padding:12px 0">입상관을 추가하세요.</div>`;
  for(const g of S.groups){
    const fps=g.floorPipes||[];
    const floorBVs=fps.reduce((s,fp)=>s+(+fp.qty||0),0);
    const pMax=groupMaxPressure(g);
    let prvChip='';
    if(pMax!=null){
      const rec=pMax>B.targetPressure;
      if(rec&&!g.prv) prvChip=`<span class="warn-chip">최대 ${pMax.toFixed(2)}kgf – PRV 권장</span>`;
      else if(!rec&&g.prv) prvChip=`<span class="warn-chip">최대 ${pMax.toFixed(2)}kgf – PRV 불필요 검토</span>`;
      else prvChip=`<span class="ok-chip">최대 ${pMax.toFixed(2)}kgf/cm²</span>`;
    }
    h+=`<div class="group-card">
      <div class="group-hdr">
        <input class="group-name-inp" value="${esc(g.name)}" onchange="setGroupName('${g.id}',this.value)" placeholder="입상관명">
        <select onchange="setGroupVal('${g.id}','pipe',this.value)">
          ${PIPES.map(p=>`<option${p===g.pipe?' selected':''}>${p}</option>`).join('')}
        </select>
        <span style="font-size:11px;color:var(--text2)">담당층</span>
        <input class="zone-inp" type="number" min="1" style="width:46px" value="${g.fromFloor||''}" placeholder="—" onchange="setGroupVal('${g.id}','fromFloor',this.value?+this.value:null)">
        <span style="font-size:11px;color:var(--text2)">~</span>
        <input class="zone-inp" type="number" min="1" style="width:46px" value="${g.toFloor||''}" placeholder="—" onchange="setGroupVal('${g.id}','toFloor',this.value?+this.value:null)">
        <label class="prv-check">
          <input type="checkbox" ${g.prv?'checked':''} onchange="setGroupVal('${g.id}','prv',this.checked)">
          <span style="color:var(--warn)">감압밸브(PRV)</span>
        </label>
        ${prvChip}
        <button class="btn btn-danger btn-sm ml" onclick="delGroup('${g.id}')">삭제</button>
      </div>
      <div class="zone-list">
        <div class="fr" style="gap:6px;margin-bottom:6px">
          <span style="font-size:11px;color:var(--text2);font-weight:600">층별 주관</span>
          <button class="btn btn-ghost btn-sm" onclick="addFloorPipe('${g.id}')">+ 층 추가</button>
          ${floorBVs?`<span style="font-size:10px;color:#bc8cff;margin-left:4px">BV ${floorBVs}개</span>`:''}
        </div>
        ${fps.map((fp,fi)=>`<div class="zone-row">
          <input class="zone-inp" type="number" min="1" value="${fp.floorNo||fi+1}" placeholder="층" onchange="setFloorPipeProp('${g.id}',${fi},'floorNo',+this.value)" style="width:52px">층
          <select onchange="setFloorPipeProp('${g.id}',${fi},'pipe',this.value)">
            ${PIPES.map(p=>`<option${p===fp.pipe?' selected':''}>${p}</option>`).join('')}
          </select>
          <span style="font-size:11px;color:var(--text2)">수량</span>
          <input class="zone-inp" type="number" min="1" value="${fp.qty||1}" onchange="setFloorPipeProp('${g.id}',${fi},'qty',+this.value)" style="width:46px">
          <button class="btn btn-danger btn-sm" onclick="delFloorPipe('${g.id}',${fi})">✕</button>
        </div>`).join('')}
        ${!fps.length?`<span style="font-size:11px;color:var(--text2)">층별 주관 없음</span>`:''}
      </div>
      <div class="zone-list" style="margin-top:6px">
        <div class="fr" style="gap:6px;margin-bottom:6px">
          <span style="font-size:11px;color:var(--text2);font-weight:600">화장실(Zone)</span>
          <button class="btn btn-ghost btn-sm" onclick="addZone('${g.id}')">+ 화장실 추가</button>
          ${g.zones.length?`<span style="font-size:10px;color:#bc8cff;margin-left:4px">BV ${g.zones.length}개</span>`:''}
        </div>
        ${g.zones.map((z,zi)=>`<div class="zone-row">
          <input class="zone-inp" value="${esc(z.name)}" placeholder="화장실명" onchange="setZoneProp('${g.id}',${zi},'name',this.value)">
          <select onchange="setZoneProp('${g.id}',${zi},'pipe',this.value)">
            ${PIPES.map(p=>`<option${p===z.pipe?' selected':''}>${p}</option>`).join('')}
          </select>
          <button class="btn btn-danger btn-sm" onclick="delZone('${g.id}',${zi})">✕</button>
        </div>`).join('')}
        ${!g.zones.length?`<span style="font-size:11px;color:var(--text2)">화장실 없음</span>`:''}
      </div>
    </div>`;
  }
  h+=`</div>`;

  // 마찰손실 검토
  h+=`<div class="section"><div class="section-title">마찰손실 검토 (Hazen-Williams · STS C=150)</div>`;
  if(S.system==='booster'){
    h+=`<div class="form-row">
      <span class="form-label">기계실 배관 길이 (m)</span>
      <input class="form-inp sm" type="number" step="1" value="${P.mrLen??8}" onchange="setPump('mrLen',+this.value)">
      <span style="font-size:11px;color:var(--text2)">펌프 토출 ~ 입상관 분기까지 배관 길이 합계</span>
    </div>`;
  }
  if(!S.groups.length){
    h+=`<div style="color:var(--text2);font-size:12px;padding:6px 0">입상관을 추가하고 유량을 입력하면 검토표가 나타납니다.</div></div>`;
  } else {
    h+=`<table class="floor-table"><thead><tr>
      <th>입상관</th><th>유량 (L/min)</th><th>수평길이 (m)</th><th>수직 (자동)</th><th>밸브·부속 상당길이</th><th>마찰손실 (kgf/cm²)</th><th>말단 예상압</th><th>판정</th>
    </tr></thead><tbody>`;
    for(const g of S.groups){
      const r=groupFriction(g);
      h+=`<tr>
        <td style="font-weight:600">${esc(g.name)}${g.prv?' <span style="color:var(--warn);font-size:10px">PRV</span>':''}</td>
        <td><input class="zone-inp" type="number" min="0" style="width:72px" value="${g.flowLpm||''}" placeholder="—" onchange="setGroupVal('${g.id}','flowLpm',this.value?+this.value:null)"></td>
        <td><input class="zone-inp" type="number" min="0" style="width:60px" value="${g.horizLen||''}" placeholder="0" onchange="setGroupVal('${g.id}','horizLen',this.value?+this.value:null)"></td>`;
      if(r){
        const ok=r.endP>=MIN_PRESSURE;
        h+=`<td>${r.Lv.toFixed(1)}m</td>
          <td>${(r.Le+r.Lfit).toFixed(1)}m</td>
          <td>${(r.hf+r.hfMr).toFixed(2)}</td>
          <td style="font-weight:700">${r.endP.toFixed(2)}</td>
          <td>${ok?'<span class="ok-chip">적정</span>':'<span class="bad-chip">압력부족</span>'}</td>`;
      } else {
        h+=`<td colspan="5" style="color:var(--text2)">← 유량 입력 시 자동 계산</td>`;
      }
      h+=`</tr>`;
    }
    h+=`</tbody></table>
    <div style="font-size:11px;color:var(--text2);margin-top:8px">
      ※ 수평길이 = 입상관 분기에서 <strong>최상층의 가장 먼 화장실</strong>까지 수평 구간 합계(최불리 경로). 입상관마다 각자의 최원 경로를 입력하세요.<br>
      ※ 수직길이는 담당층(미입력 시 최고층)×층고로 자동. 밸브 상당길이는 경로상 밸브(분기·층주관·화장실 볼밸브, PRV 전 게이트×2·스트레이너)를 L/D 환산해 자동 반영, 엘보·티는 직관장의 20% 개산.<br>
      ※ 말단 예상압 = 시작압 − 최고층 정수두 − 마찰손실. PRV 입상관은 2차 설정압(분기부 설치 가정) 기준${S.system==='booster'?', 비PRV 입상관은 펌프 토출압 기준(기계실 구간 손실 포함)':''}. 최소 필요압 ${MIN_PRESSURE}kgf/cm²(세정밸브 1.0).
    </div></div>`;
  }

  // 기계실 물량 (개산) — 구간별 입력, 대수·개소는 자동 곱
  const M=S.mr||{};
  const nPrv=S.groups.filter(g=>g.prv).length;
  h+=`<div class="section"><div class="section-title">기계실 물량 입력 (개산) — TP: 감압밸브 세트 출구까지</div>
    <div class="form-row">
      <span class="form-label">수도 인입관 직관 (m)</span>
      <input class="form-inp sm" type="number" min="0" value="${M.inletLen??10}" onchange="setMR('inletLen',this.value)">
      <span style="font-size:11px;color:var(--text2)">계량기~저수조 직관 (바이패스는 아래 별도)</span>
    </div>`;
  if(S.system==='booster'){
    h+=`<div class="form-row">
      <span class="form-label">LCV 바이패스 (m)</span>
      <input class="form-inp sm" type="number" min="0" step="0.5" value="${M.lcvBypLen??3}" onchange="setMR('lcvBypLen',this.value)">
      <span style="font-size:11px;color:var(--text2)">인입 관경으로 산출에 포함</span>
    </div>
    <div class="form-row">
      <span class="form-label">펌프 흡입 배관 — 1대당 (m)</span>
      <input class="form-inp sm" type="number" min="0" step="0.5" value="${M.suctionLen??4}" onchange="setMR('suctionLen',this.value)">
      <span style="font-size:11px;color:var(--accent)">× ${P.count}대 = ${(((+M.suctionLen)||0)*P.count).toFixed(1)}m 자동</span>
      <span style="font-size:11px;color:var(--text2)">흡입 헤더 분기~펌프 노즐까지</span>
    </div>
    <div class="form-row">
      <span class="form-label">펌프 토출 배관 — 1대당 (m)</span>
      <input class="form-inp sm" type="number" min="0" step="0.5" value="${M.dischargeLen??2}" onchange="setMR('dischargeLen',this.value)">
      <span style="font-size:11px;color:var(--accent)">× ${P.count}대 = ${(((+M.dischargeLen)||0)*P.count).toFixed(1)}m 자동</span>
      <span style="font-size:11px;color:var(--text2)">펌프 노즐~합류점(티)까지만 — 합관 이후는 아래 헤더·메인에서 1회 계산</span>
    </div>
    <div class="form-row">
      <span class="form-label">비상 바이패스 (m)</span>
      <input class="form-inp sm" type="number" min="0" step="0.5" value="${M.emerBypLen??6}" onchange="setMR('emerBypLen',this.value)">
      <span style="font-size:11px;color:var(--text2)">시수직결 우회 배관 (인입 관경)</span>
    </div>`;
  }
  h+=`<div class="form-row">
      <span class="form-label">${S.system==='booster'?'토출 헤더·메인 (m)':'수조 출구·메인 (m)'}</span>
      <span style="font-size:13px;font-weight:600">${P.mrLen??8} m</span>
      <span style="font-size:11px;color:var(--text2)">위 '마찰손실 검토'의 기계실 배관 길이와 공용</span>
    </div>`;
  if(nPrv){
    h+=`<div class="form-row">
      <span class="form-label">PRV 세트당 배관 (m)</span>
      <input class="form-inp sm" type="number" min="0" step="0.5" value="${M.prvSetLen??2}" onchange="setMR('prvSetLen',this.value)">
      <span style="font-size:11px;color:var(--accent)">× PRV ${nPrv}개소 자동</span>
    </div>`;
  }
  h+=`<div class="form-row">
      <span class="form-label">엘보 개산 계수 (개/m)</span>
      <input class="form-inp sm" type="number" step="0.05" min="0" value="${M.elbowK??0.4}" onchange="setMR('elbowK',this.value)">
      <span class="form-label" style="width:auto">티 계수 (개/m)</span>
      <input class="form-inp sm" type="number" step="0.05" min="0" value="${M.teeK??0.15}" onchange="setMR('teeK',this.value)">
    </div>
    <div class="form-row">
      <span class="form-label">보온재</span>
      <select onchange="setMR('insul',this.value)">
        ${['고무발포 25T','고무발포 19T','유리면 50T','보온 없음'].map(o=>`<option${o===(M.insul||'고무발포 25T')?' selected':''}>${o}</option>`).join('')}
      </select>
      <span style="font-size:11px;color:var(--text2)">결로방지 보온 — 배관 길이에서 자동 산출</span>
    </div>
    <div style="font-size:11px;color:var(--text2)">
      ※ 부속(엘보·티)은 개산율 방식 — 기계실은 배관 밀도가 높아 평면 카운트보다 개산이 실제에 가깝습니다. 계수는 사무소 기준에 맞게 조정하세요.<br>
      ※ 산출 결과는 ③ 밸브 목록 하단과 엑셀(CSV)에 포함됩니다.
    </div>
  </div>`;

  document.getElementById('settingsPanel').innerHTML=h;
}

// ── Tab 2: Diagram SVG ────────────────────────────────────────────────────────
// 화면용 다크 / 인쇄용 라이트 팔레트 — beforeprint에서 light로 전환
const THEMES={
  dark:{bg:'#0d1117',surface:'#161b22',border:'#30363d',text:'#e6edf3',text2:'#8b949e',warnBg:'#1c1608',
    sc:{gv:'#3fb950',bv:'#bc8cff',cv:'#58a6ff',prv:'#d29922',st:'#3fb950',
      av:'#f85149',dv:'#8b949e',pg:'#d29922',wh:'#bc8cff',ex:'#8b949e',
      fj:'#58a6ff',globe:'#f78166',pipe:'#8b949e',lcv:'#58a6ff',fm:'#58a6ff'}},
  light:{bg:'#ffffff',surface:'#f6f8fa',border:'#8c959f',text:'#1f2328',text2:'#57606a',warnBg:'#fff8c5',
    sc:{gv:'#1a7f37',bv:'#6639ba',cv:'#0969da',prv:'#9a6700',st:'#1a7f37',
      av:'#cf222e',dv:'#57606a',pg:'#9a6700',wh:'#6639ba',ex:'#57606a',
      fj:'#0969da',globe:'#bc4c00',pipe:'#57606a',lcv:'#0969da',fm:'#0969da'}}
};
let TH=THEMES.dark, SC=TH.sc;

function svgLine(x1,y1,x2,y2,col,w=2){return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${col||SC.pipe}" stroke-width="${w}"/>`;}
function svgText(x,y,t,col,sz=9,anc='middle',fw='normal'){return `<text x="${x}" y="${y}" text-anchor="${anc}" fill="${col||TH.text2}" font-size="${sz}" font-weight="${fw}">${esc(t)}</text>`;}

function symGV(x,y,s=10,lbl='GV'){
  return `<g>
    <polygon points="${x-s},${y-s} ${x},${y} ${x-s},${y+s}" fill="${SC.gv}" opacity=".9"/>
    <polygon points="${x+s},${y-s} ${x},${y} ${x+s},${y+s}" fill="${SC.gv}" opacity=".9"/>
    ${svgText(x+s+9,y+4,lbl,SC.gv,8,'start')}
  </g>`;
}
function symBV(x,y,s=10,lbl='BV'){
  return `<g>
    <circle cx="${x}" cy="${y}" r="${s}" fill="${SC.bv}" fill-opacity=".2" stroke="${SC.bv}" stroke-width="1.5"/>
    <line x1="${x-s}" y1="${y}" x2="${x+s}" y2="${y}" stroke="${SC.bv}" stroke-width="3"/>
    ${svgText(x+s+9,y+4,lbl,SC.bv,8,'start')}
  </g>`;
}
function symCV(x,y,s=10,lbl='CV'){
  return `<g>
    <circle cx="${x}" cy="${y}" r="${s}" fill="none" stroke="${SC.cv}" stroke-width="1.5"/>
    <polygon points="${x-4},${y-7} ${x+8},${y} ${x-4},${y+7}" fill="${SC.cv}"/>
    ${svgText(x+s+9,y+4,lbl,SC.cv,8,'start')}
  </g>`;
}
function symPRV(x,y,s=12,lbl='PRV'){
  return `<g>
    <polygon points="${x},${y-s} ${x+s},${y} ${x},${y+s} ${x-s},${y}" fill="${SC.prv}" fill-opacity=".25" stroke="${SC.prv}" stroke-width="1.5"/>
    ${svgText(x,y+4,'P',SC.prv,9)}
    ${svgText(x+s+9,y+4,lbl,SC.prv,8,'start')}
  </g>`;
}
function symST(x,y,s=11){
  return `<g>
    <rect x="${x-s}" y="${y-6}" width="${s*2}" height="12" fill="${SC.st}" fill-opacity=".15" stroke="${SC.st}" stroke-width="1.5" rx="2"/>
    <line x1="${x}" y1="${y+6}" x2="${x+7}" y2="${y+16}" stroke="${SC.st}" stroke-width="1.5"/>
    ${svgText(x,y+4,'Y',SC.st,8)}
    ${svgText(x+s+9,y+4,'ST',SC.st,8,'start')}
  </g>`;
}
function symPump(x,y,r=18,lbl='펌프'){
  return `<g>
    <circle cx="${x}" cy="${y}" r="${r}" fill="${TH.surface}" stroke="${SC.cv}" stroke-width="2"/>
    <path d="M${x-7},${y+4} Q${x},${y-8} ${x+7},${y+4}" fill="none" stroke="${SC.cv}" stroke-width="2"/>
    <polygon points="${x+7},${y} ${x+7},${y+8} ${x+15},${y+4}" fill="${SC.cv}"/>
    ${svgText(x,y+r+12,lbl,TH.text2,8)}
  </g>`;
}
function symAV(x,y,lbl='AV'){
  return `<g>
    <polygon points="${x},${y-12} ${x-7},${y+6} ${x+7},${y+6}" fill="${SC.av}" fill-opacity=".8"/>
    <line x1="${x}" y1="${y+6}" x2="${x}" y2="${y+14}" stroke="${SC.av}" stroke-width="2"/>
    ${svgText(x+10,y+4,lbl,SC.av,8,'start')}
  </g>`;
}
function symDV(x,y,lbl='DV'){
  return `<g>
    <polygon points="${x},${y+12} ${x-7},${y-6} ${x+7},${y-6}" fill="${SC.dv}" fill-opacity=".8"/>
    <line x1="${x}" y1="${y-14}" x2="${x}" y2="${y-6}" stroke="${SC.dv}" stroke-width="2"/>
    ${svgText(x+10,y+4,lbl,SC.dv,8,'start')}
  </g>`;
}
function symPG(x,y,lbl='PG'){
  return `<g>
    <circle cx="${x}" cy="${y}" r="10" fill="${SC.pg}" fill-opacity=".2" stroke="${SC.pg}" stroke-width="1.5"/>
    <line x1="${x-4}" y1="${y+3}" x2="${x+5}" y2="${y-4}" stroke="${SC.pg}" stroke-width="1.5"/>
    ${svgText(x+14,y+4,lbl,SC.pg,8,'start')}
  </g>`;
}
function symWH(x,y){
  return `<g>
    <rect x="${x-8}" y="${y-14}" width="16" height="20" rx="8" fill="${SC.wh}" fill-opacity=".2" stroke="${SC.wh}" stroke-width="1.5"/>
    <rect x="${x-4}" y="${y+6}" width="8" height="5" fill="${SC.wh}" fill-opacity=".6"/>
    ${svgText(x+12,y+4,'WH',SC.wh,8,'start')}
  </g>`;
}
function symEX(x,y){
  return `<g>
    <path d="M${x-14},${y} Q${x-7},${y-8} ${x},${y} Q${x+7},${y+8} ${x+14},${y}" fill="none" stroke="${SC.ex}" stroke-width="2"/>
    ${svgText(x+20,y+4,'EX',SC.ex,8,'start')}
  </g>`;
}
function symFJ(x,y){
  return `<g>
    <path d="M${x-10},${y} Q${x-5},${y-7} ${x},${y} Q${x+5},${y+7} ${x+10},${y}" fill="none" stroke="${SC.fj}" stroke-width="1.5"/>
    <path d="M${x-10},${y} Q${x-5},${y+7} ${x},${y} Q${x+5},${y-7} ${x+10},${y}" fill="none" stroke="${SC.fj}" stroke-width="1.5"/>
  </g>`;
}
function symGlobe(x,y,lbl='GL'){
  return `<g>
    <circle cx="${x}" cy="${y}" r="10" fill="${SC.globe}" fill-opacity=".2" stroke="${SC.globe}" stroke-width="1.5"/>
    <line x1="${x-10}" y1="${y}" x2="${x+10}" y2="${y}" stroke="${SC.globe}" stroke-width="1.5"/>
    <line x1="${x}" y1="${y-10}" x2="${x}" y2="${y+10}" stroke="${SC.globe}" stroke-width="1.5"/>
    ${svgText(x+14,y+4,lbl,SC.globe,8,'start')}
  </g>`;
}
function symLCV(x,y,s=11,lbl='LCV'){
  return `<g>
    <circle cx="${x}" cy="${y}" r="${s}" fill="none" stroke="${SC.lcv}" stroke-width="1.5"/>
    <line x1="${x-s}" y1="${y}" x2="${x+s}" y2="${y}" stroke="${SC.lcv}" stroke-width="1.5"/>
    <line x1="${x}" y1="${y-s}" x2="${x}" y2="${y+s}" stroke="${SC.lcv}" stroke-width="1.5"/>
    <text x="${x+s+6}" y="${y+4}" text-anchor="start" fill="${SC.lcv}" font-size="8">${lbl}</text>
  </g>`;
}
function symPT(x,y){
  return `<g>
    <rect x="${x-9}" y="${y-16}" width="18" height="26" rx="9" fill="${SC.pg}" fill-opacity=".15" stroke="${SC.pg}" stroke-width="1.5"/>
    <line x1="${x-9}" y1="${y}" x2="${x+9}" y2="${y}" stroke="${SC.pg}" stroke-width="1" stroke-dasharray="2,2"/>
    ${svgText(x+14,y+4,'PT',SC.pg,8,'start')}
  </g>`;
}
function symFM(x,y){
  return `<g>
    <circle cx="${x}" cy="${y}" r="10" fill="${SC.fm}" fill-opacity=".15" stroke="${SC.fm}" stroke-width="1.5"/>
    ${svgText(x,y+3,'FM',SC.fm,7)}
  </g>`;
}
function symTank(x,y,w,h,lbl){
  return `<g>
    <rect x="${x-w/2}" y="${y}" width="${w}" height="${h}" fill="${TH.surface}" stroke="${TH.border}" stroke-width="1.5" rx="4"/>
    ${svgText(x,y+h/2+4,lbl,TH.text2,11)}
  </g>`;
}

function renderDiagram(){
  const P=S.pump, B=S.building, G=S.groups;
  const inletPipe=P.inletPipe||'50A';
  const pumpPipe=P.pumpPipe||'65A';
  const isBst=S.system==='booster';
  const nPump=P.count;
  const pumpLabels=nPump===1?['주펌프']:nPump===2?['주펌프','예비펌프']:['주펌프①','주펌프②','예비펌프'];

  const CX=220; // main center x
  const pumpSpacing=nPump===1?0:130;
  const totalPW=(nPump-1)*pumpSpacing;
  const leftPX=CX-totalPW/2;
  const pumpXs=Array.from({length:nPump},(_,i)=>leftPX+i*pumpSpacing);

  const nGroups=G.length||1;
  const groupSpacing=Math.max(160,Math.min(200,650/nGroups));
  const totalGW=(nGroups-1)*groupSpacing;
  const svgW=Math.max(700, Math.max(CX*2+100, totalGW+300));
  const groupXs=Array.from({length:nGroups},(_,i)=>{
    const base=(svgW-(nGroups-1)*groupSpacing)/2;
    return base+i*groupSpacing;
  });

  // Y layout
  const INLET_Y=40, GV1_Y=90, CV1_Y=140;
  const TANK_Y=isBst?310:190; // 고가수조식은 LCV 구간이 없어 압축
  const TANK_H=80, TANK_BOT=TANK_Y+TANK_H;
  const GV2_Y=TANK_BOT+35;
  const PUMP_SUCK_Y=GV2_Y+55;
  // 흡입: GV→ST→FJ(펌프직근)→펌프 / 토출: 펌프→FJ→CV→GV (표준 순서)
  const COMP_OFFSETS={gv1:30,st:65,fj1:100,pump:150,fj2:200,cv:235,gv2:270};
  const PUMP_DISC_Y=PUMP_SUCK_Y+COMP_OFFSETS.gv2+30;
  const HEADER_Y=isBst?PUMP_DISC_Y+70:GV2_Y+60;

  const exCnt=Math.ceil(B.floors/3);
  const MAIN_Y=HEADER_Y+80;
  const MAIN_H=(exCnt+1)*55;
  const MAIN_END_Y=MAIN_Y+MAIN_H;

  // Group section y
  const GROUP_HDR_Y=MAIN_END_Y+50;
  const groupH=(g)=>(g&&g.prv?174:0)+165;
  const maxGH=G.length?Math.max(...G.map(groupH)):200;
  const svgH=GROUP_HDR_Y+maxGH+60;

  let s='';
  s+=`<svg width="${svgW}" height="${svgH}" viewBox="0 0 ${svgW} ${svgH}" style="display:block;min-width:600px">`;
  s+=`<rect width="${svgW}" height="${svgH}" fill="${TH.bg}"/>`;

  // ── Inlet section ──
  s+=svgText(CX,INLET_Y-8,'수도 인입관',TH.text2,10);
  s+=svgLine(CX,INLET_Y,CX,GV1_Y-10);
  s+=svgText(CX-7,INLET_Y+22,inletPipe,TH.text2,8,'end');
  s+=symGV(CX,GV1_Y);
  s+=svgLine(CX,GV1_Y+10,CX,CV1_Y-10);
  s+=svgText(CX-7,(GV1_Y+CV1_Y)/2+4,inletPipe,TH.text2,8,'end');
  s+=symCV(CX,CV1_Y);
  if(isBst){
    // ── LCV bypass section (부스터식 전용) ──
    const LCV_TOP=CV1_Y+30, LCV_Y=CV1_Y+95, LCV_BOT=CV1_Y+145, BP_X=CX+80;
    // main line: CV → split → LCV → join → tank
    s+=svgLine(CX,CV1_Y+10,CX,LCV_TOP);
    // split horizontal to bypass
    s+=svgLine(CX,LCV_TOP,BP_X,LCV_TOP);
    // main line continues through GV → ST → LCV → GV (전·후 차단 + 파일럿 보호)
    s+=svgLine(CX,LCV_TOP,CX,LCV_Y-11);
    s+=symGV(CX,LCV_TOP+16,7,'GV');
    s+=symST(CX,LCV_TOP+38);
    s+=symLCV(CX,LCV_Y);
    s+=svgLine(CX,LCV_Y+11,CX,LCV_BOT);
    s+=symGV(CX,LCV_BOT-20,7,'GV');
    // join horizontal from bypass
    s+=svgLine(CX,LCV_BOT,BP_X,LCV_BOT);
    s+=svgLine(CX,LCV_BOT,CX,TANK_Y);
    // bypass vertical
    s+=svgLine(BP_X,LCV_TOP,BP_X,LCV_BOT);
    // bypass GV (normally closed) — 1개
    s+=symGV(BP_X,LCV_TOP+35,8,'GV');
    s+=svgText(BP_X+20,(LCV_TOP+LCV_BOT)/2+4,'바이패스',SC.prv,7,'start');
    s+=svgText(BP_X+20,(LCV_TOP+LCV_BOT)/2+14,'(평상시 닫힘)',SC.prv,7,'start');
    // pipe labels
    s+=svgText(CX-7,(CV1_Y+TANK_Y)/2+4,inletPipe,TH.text2,8,'end');
  } else {
    // 고가수조식: 볼탭이 수위 조절 — 인입관 직결
    s+=svgLine(CX,CV1_Y+10,CX,TANK_Y);
    s+=svgText(CX-7,(CV1_Y+TANK_Y)/2+4,inletPipe,TH.text2,8,'end');
  }

  const tankLbl=isBst?'저수조':'고가수조';
  const outPipe=isBst?pumpPipe:P.mainPipe;
  s+=symTank(CX,TANK_Y,120,TANK_H,tankLbl);
  // Ball float inside tank
  s+=`<circle cx="${CX+35}" cy="${TANK_Y+18}" r="7" fill="none" stroke="${SC.gv}" stroke-width="1.5"/>`;
  s+=svgText(CX+35,TANK_Y+34,'볼탭',SC.gv,7);
  s+=svgLine(CX,TANK_BOT,CX,GV2_Y-10);
  s+=svgText(CX-7,(TANK_BOT+GV2_Y)/2+4,outPipe,TH.text2,8,'end');
  s+=symGV(CX,GV2_Y);
  if(isBst){
    s+=svgLine(CX,GV2_Y+10,CX,PUMP_SUCK_Y);
    s+=svgText(CX-7,(GV2_Y+PUMP_SUCK_Y)/2+4,pumpPipe,TH.text2,8,'end');
  }

  if(isBst){
    // ── Pump section ──
    // Suction header
    if(nPump>1) s+=svgLine(pumpXs[0],PUMP_SUCK_Y,pumpXs[nPump-1],PUMP_SUCK_Y);
    // Main drop to suction header
    if(CX!==pumpXs[Math.floor(nPump/2)]){
      const midPX=pumpXs[Math.floor((nPump-1)/2)];
      s+=svgLine(CX,PUMP_SUCK_Y,midPX,PUMP_SUCK_Y);
    }

    for(let i=0;i<nPump;i++){
      const px=pumpXs[i];
      s+=svgLine(px,PUMP_SUCK_Y,px,PUMP_DISC_Y);
      s+=svgText(px-7,PUMP_SUCK_Y+16,pumpPipe,TH.text2,8,'end');
      s+=symGV(px,PUMP_SUCK_Y+COMP_OFFSETS.gv1,8,'GV');
      s+=symST(px,PUMP_SUCK_Y+COMP_OFFSETS.st);
      s+=symFJ(px,PUMP_SUCK_Y+COMP_OFFSETS.fj1);
      s+=symPump(px,PUMP_SUCK_Y+COMP_OFFSETS.pump,18,pumpLabels[i]);
      s+=symFJ(px,PUMP_SUCK_Y+COMP_OFFSETS.fj2);
      s+=svgText(px-7,PUMP_SUCK_Y+COMP_OFFSETS.fj2+18,pumpPipe,TH.text2,8,'end');
      s+=symCV(px,PUMP_SUCK_Y+COMP_OFFSETS.cv,8,'CV');
      s+=symGV(px,PUMP_SUCK_Y+COMP_OFFSETS.gv2,8,'GV');
    }

    // Discharge header
    if(nPump>1) s+=svgLine(pumpXs[0],PUMP_DISC_Y,pumpXs[nPump-1],PUMP_DISC_Y);
    const midPX=pumpXs[Math.floor((nPump-1)/2)];
    s+=svgLine(midPX,PUMP_DISC_Y,CX,PUMP_DISC_Y);
    s+=svgLine(CX,PUMP_DISC_Y,CX,HEADER_Y);
    s+=svgText(CX-7,(PUMP_DISC_Y+HEADER_Y)/2+4,P.mainPipe,TH.text2,8,'end');

    // 토출 헤더 계기: 압력계·압력탱크(우) / 수격방지기(좌)
    s+=svgLine(CX,HEADER_Y-50,CX+60,HEADER_Y-50);
    s+=symPG(CX+60,HEADER_Y-50);
    s+=svgLine(CX,HEADER_Y-15,CX+60,HEADER_Y-15);
    s+=symPT(CX+60,HEADER_Y-15);
    s+=svgLine(CX,HEADER_Y-32,CX-60,HEADER_Y-32);
    s+=symWH(CX-60,HEADER_Y-32);

    // 비상 바이패스 — 시수 인입관(체크밸브 직후)에서 분기, 저수조·펌프를 우회해 토출 주관에 직결
    {
      const ebX=Math.max(pumpXs[nPump-1]+70,CX+140);
      const bpD='stroke-dasharray="6,3" stroke-opacity=".7"';
      const ebTop=CV1_Y+15, ebBot=PUMP_DISC_Y+10;
      const ebMid=(ebTop+ebBot)/2;
      s+=`<line x1="${CX}" y1="${ebTop}" x2="${ebX}" y2="${ebTop}" stroke="${SC.prv}" stroke-width="1.5" ${bpD}/>`;
      s+=`<line x1="${ebX}" y1="${ebTop}" x2="${ebX}" y2="${ebBot}" stroke="${SC.prv}" stroke-width="1.5" ${bpD}/>`;
      s+=`<line x1="${ebX}" y1="${ebBot}" x2="${CX}" y2="${ebBot}" stroke="${SC.prv}" stroke-width="1.5" ${bpD}/>`;
      s+=symGV(ebX,ebTop+40,8,'GV');
      s+=symCV(ebX,ebTop+80,8,'CV');
      s+=symGV(ebX,ebBot-40,8,'GV');
      s+=`<rect x="${ebX+6}" y="${ebMid-22}" width="66" height="44" rx="3" fill="${TH.warnBg}" stroke="${SC.prv}" stroke-width="1" opacity=".9"/>`;
      s+=svgText(ebX+39,ebMid-8,'비상 바이패스',SC.prv,8);
      s+=svgText(ebX+39,ebMid+4,'(시수직결)',SC.prv,7);
      s+=svgText(ebX+39,ebMid+16,'평상시 닫힘',SC.prv,7);
    }

  } else {
    // Gravity: simple drop
    s+=svgLine(CX,GV2_Y+10,CX,HEADER_Y);
    s+=svgText(CX-7,(GV2_Y+HEADER_Y)/2+4,P.mainPipe,TH.text2,8,'end');
  }

  // ── Main pipe section ──
  s+=svgLine(CX,HEADER_Y,CX,MAIN_END_Y,SC.pipe,2.5);
  // 유량계 + 전·후 차단 게이트 (교체용)
  s+=symGV(CX,HEADER_Y+18,7,'GV');
  s+=symFM(CX,HEADER_Y+42);
  s+=symGV(CX,HEADER_Y+66,7,'GV');
  s+=svgText(CX-12,HEADER_Y+90,P.mainPipe,SC.cv,8,'end');

  // AV at top
  s+=svgLine(CX,MAIN_Y,CX+60,MAIN_Y);
  s+=symAV(CX+60,MAIN_Y-10);

  // EX joints
  const exSpacing=MAIN_H/(exCnt+1);
  for(let i=0;i<exCnt;i++){
    const ey=MAIN_Y+exSpacing*(i+1);
    s+=symEX(CX,ey);
    s+=svgText(CX-55,ey+4,`${Math.min((i+1)*3,B.floors)}층`,SC.ex,8,'end');
  }

  // DV at bottom
  s+=svgLine(CX,MAIN_END_Y,CX+60,MAIN_END_Y);
  s+=symDV(CX+60,MAIN_END_Y+10);

  // ── Group distribution header ──
  s+=svgLine(CX,MAIN_END_Y,CX,GROUP_HDR_Y);
  s+=svgText(CX-7,(MAIN_END_Y+GROUP_HDR_Y)/2+4,P.mainPipe,TH.text2,8,'end');
  if(G.length){
    const minGX=Math.min(...groupXs), maxGX=Math.max(...groupXs);
    s+=svgLine(minGX,GROUP_HDR_Y,maxGX,GROUP_HDR_Y);
    s+=svgText(CX,GROUP_HDR_Y-7,P.mainPipe,TH.text2,8);
  }

  // ── Groups ──
  for(let i=0;i<G.length;i++){
    const g=G[i], gx=groupXs[i];
    let gy=GROUP_HDR_Y;

    // Drop from distribution header → BV (입상관 초입)
    s+=svgLine(gx,gy,gx,gy+15);
    s+=svgText(gx-7,gy+8,g.pipe,TH.text2,8,'end');
    gy+=15;
    s+=symBV(gx,gy+10,9,'BV');
    gy+=25;
    s+=svgLine(gx,gy,gx,gy+10);
    gy+=10;

    if(g.prv){
      // GV → ST → PG(1차) → PRV → PG(2차) → GV
      const bpCol=SC.prv; const bpDash='stroke-dasharray="6,3" stroke-opacity=".7"';
      s+=symGV(gx,gy+8,8,'GV');
      s+=svgLine(gx,gy+16,gx,gy+33);
      s+=symST(gx,gy+41);
      s+=svgLine(gx,gy+53,gx,gy+65);
      s+=svgLine(gx,gy+71,gx+32,gy+71); s+=symPG(gx+32,gy+71,'PG1');
      s+=svgLine(gx,gy+77,gx,gy+89);
      s+=symPRV(gx,gy+101);
      s+=svgLine(gx,gy+113,gx,gy+125);
      s+=svgLine(gx,gy+131,gx+32,gy+131); s+=symPG(gx+32,gy+131,'PG2');
      s+=svgLine(gx,gy+137,gx,gy+148);
      s+=symGV(gx,gy+156,8,'GV');
      s+=svgLine(gx,gy+164,gx,gy+174);
      const bx=gx-62;
      s+=`<line x1="${gx}" y1="${gy+8}" x2="${bx}" y2="${gy+8}" stroke="${bpCol}" stroke-width="1.5" ${bpDash}/>`;

function renderLegend(x,y){

  const prvGroups=S.groups.filter(g=>g.prv);
  let h='';

  if(prvGroups.length){
    h+=`<div class="warn-banner">⚠️ 감압밸브(PRV) 설치 필요 입상관: `;

  }

  // Summary cards
  h+=`<div class="valve-summary-grid">`;
  for(const [name,qty] of Object.entries(summary)){
    if(!qty) continue;
    const col=COLORS[name]||'#8b949e';
    const detail=Object.keys(byPipe[name]||{})
      .sort((a,b)=>PIPES.indexOf(a)-PIPES.indexOf(b))
      .map(p=>`${p}×${byPipe[name][p]}`).join(' · ');
    h+=`<div class="vscard">
      <div class="vscard-name" style="color:${col}">${name}</div>
      <div class="vscard-count" style="color:${col}">${qty}</div>
      <div class="vscard-unit">개</div>

    </div>`;
  }
  h+=`</div>`;

  // Detail table
  h+=`<div class="section">
    <div class="fr mb">
      <span class="section-title" style="margin:0">상세 밸브 목록</span>
      <button class="btn btn-success btn-sm ml" onclick="exportCSV()">📊 엑셀(CSV) 내보내기</button>
    </div>
    <table class="vlist"><thead><tr>
      <th>No.</th><th>설치 위치</th><th>기기명</th><th>규격</th><th>재질/등급</th><th>구경</th><th>수량</th><th>비고</th>
    </tr></thead><tbody>`;
  for(const item of list){
    const col=COLORS[item.name]||'#8b949e';
    h+=`<tr>
      <td style="color:var(--text2)">${item.no}</td>
      <td>${esc(item.pos)}</td>
      <td><span style="color:${col};font-weight:600">${esc(item.name)}</span></td>
      <td>${esc(item.spec)}</td>
      <td style="color:var(--text2)">${esc(item.mat||'-')}</td>
      <td><span class="badge" style="background:${col}22;border:1px solid ${col}66;color:${col}">${esc(item.pipe)}</span></td>
      <td style="font-weight:700">${item.qty}</td>
      <td style="color:var(--text2)">${esc(item.note)}</td>
    </tr>`;
  }
  h+=`</tbody></table></div>`;

  // 기계실 물량 (개산)
  const mr=calcMR();

    const spec=pipeSpecLabel();
    const doInsul=mr.insul!=='보온 없음';
    h+=`<div class="section"><div class="section-title">기계실 물량 (개산) — TP: 감압밸브 세트 출구까지</div>
      <table class="vlist"><thead><tr>
        <th>구분</th><th>품명</th><th>규격</th><th>구경</th><th>수량</th><th>단위</th><th>비고</th>
      </tr></thead><tbody>`;
    for(const it of mr.items){
      h+=`<tr><td>배관</td><td>강관</td><td>${esc(spec)}</td><td>${esc(it.pipe)}</td><td style="font-weight:700">${it.len}</td><td>m</td><td style="color:var(--text2)">${esc(it.name)}${it.note?' · '+esc(it.note):''}</td></tr>`;
    }
    for(const it of mr.items){
      if(it.elbow) h+=`<tr><td>부속</td><td>엘보 90°</td><td>${esc(spec)}</td><td>${esc(it.pipe)}</td><td style="font-weight:700">${it.elbow}</td><td>개</td><td style="color:var(--text2)">${it.len}m × ${mr.eK}개/m 개산</td></tr>`;
    }
    for(const it of mr.items){

    }
    if(mr.reducer) h+=`<tr><td>부속</td><td>레듀서</td><td>${esc(spec)}</td><td>${esc(S.pump.pumpPipe||'65A')}</td><td style="font-weight:700">${mr.reducer}</td><td>개</td><td style="color:var(--text2)">펌프 접속부 ×2/대</td></tr>`;
    if(doInsul){
      for(const it of mr.items){
        h+=`<tr><td>보온</td><td>배관 보온</td><td>${esc(mr.insul)}</td><td>${esc(it.pipe)}</td><td style="font-weight:700">${it.len}</td><td>m</td><td style="color:var(--text2)">결로방지 — ${esc(it.name)}</td></tr>`;

  document.getElementById('valvePanel').innerHTML=h;
}

function gwrap(w,h,inner){return `<div style="overflow-x:auto;margin:10px 0"><svg viewBox="0 0 ${w} ${h}" width="100%" style="max-width:${Math.round(w*1.15)}px;display:block">${inner}</svg></div>`;}
function garrow(x1,y1,x2,y2,col,w=2){
  const ang=Math.atan2(y2-y1,x2-x1);
  const hx=x2-7*Math.cos(ang), hy=y2-7*Math.sin(ang);
  const pt=a=>`${(x2-11*Math.cos(ang+a)).toFixed(1)},${(y2-11*Math.sin(ang+a)).toFixed(1)}`;

}

function renderGuide(){
  const matLabel={sts:'STS 표준',allsts:'전체 STS(고급)',general:'일반(청동/주철)'}[S.material||'sts'];
  const rating=(S.system==='booster'&&S.pump.pressure>=10)?'16K':'10K';
  const guides=[
    {icon:'▣',color:SC.cv,badge:'재질기준',title:'재질·압력등급 선정 기준',
     body:`<strong style="color:var(--text)">배관 재질</strong><br>
       · 위생(화장실·세대) 라인: STS304 프레스식 접합이 표준입니다. 과거 백강관(아연도금)은 녹물 문제로 퇴출되었습니다.<br>
       · 펌프실(기계실): 배관은 동일하게 STS304를 쓰되, 대구경은 그루브드 조인트(빅토릭) 접합이 시공·유지보수에 유리해 널리 쓰입니다.<br><br>
       <strong style="color:var(--text)">밸브 재질 (본 앱 기본값 'STS 표준' 프리셋 기준)</strong><br>
       · 소구경(50A 이하): STS304 나사식 — STS 볼밸브 가격이 낮아져 청동보다 많이 씁니다.<br>
       · 대구경(65A 이상): 몸통 덕타일주철 + 디스크·시트 STS, 플랜지식 — 접수부는 에폭시 코팅이라 위생상 문제 없으며, 전량 STS 대비 경제적입니다.<br>
       · 펌프 토출 체크밸브: 주철 스모렌스키(스프링 리프트식) — 수격이 적어 펌프 토출 표준. 소구경은 스윙식.<br>
       · 감압밸브(PRV): 주철 파일럿식.<br>
       · 전량 STS 밸브는 병원 등 고급 사양에서 적용합니다 — '전체 STS' 프리셋을 선택하세요.<br><br>
       <strong style="color:var(--text)">압력등급</strong><br>
       · 기본 10K, 펌프 토출압 10kgf/cm² 이상(고층)이면 16K — 본 앱이 자동 적용합니다.<br><br>
       <strong style="color:var(--text)">참고</strong><br>
       · 기계실 대구경 차단용은 게이트밸브 대신 버터플라이밸브(덕타일+STS 디스크, 그루브드/웨이퍼)로 대체하는 추세입니다 — 가볍고 저렴하며 공간을 절약합니다.`,
     tip:`현재 설정: <strong>${matLabel}</strong> / 압력등급 <strong>${rating}</strong> — ① 계통 설정 탭의 '밸브 재질 사양'에서 변경하면 밸브 목록·엑셀에 자동 반영됩니다.`},
    {icon:'⊞',color:SC.gv,badge:'완전개폐',title:'게이트밸브 (GV)',svg:gdGV(),
     body:`<strong>원리</strong> : 칼처럼 생긴 판(게이트)이 위아래로 오르내리며 유로를 열고 닫습니다.<br>완전 개폐 전용이며 유량 조절에는 사용하지 않습니다 — 반쯤 열면 판이 물살에 떨려 소음·마모가 생깁니다.<br>대구경(65A 이상) 메인관과 펌프 주변 배관에 주로 사용합니다.<br>펌프 흡입측에는 유체 저항이 적은 게이트밸브를 사용해야 합니다.`,
     tip:'펌프 흡입측 배관은 유체 저항 최소화가 핵심입니다. 흡입 배관이 길거나 저항이 클수록 공동현상(캐비테이션)이 발생할 수 있습니다.'},
    {icon:'●',color:SC.bv,badge:'Zone분기',title:'볼밸브 (BV)',svg:gdBV(),
     body:`<strong>원리</strong> : 구멍 뚫린 공이 90° 돌아가며 구멍을 유로에 맞추면 열림, 돌려 막으면 닫힘입니다.<br>레버 방향만 봐도 개폐 상태를 즉시 알 수 있어 긴급 차단에 유리합니다.<br>소구경(15A~100A) Zone 분기 및 세대 입구 차단밸브로 표준 사용됩니다.<br>완전 개방 시 유체 저항이 거의 없습니다.`,
     tip:'Zone 분기 차단밸브의 표준입니다. 빠른 긴급 차단이 필요한 위치에 적합합니다.'},
    {icon:'→',color:SC.cv,badge:'역류방지',title:'체크밸브 (CV)',svg:gdCV(),
     body:`<strong>원리</strong> : 한쪽으로만 열리는 문 — 정방향 물살은 문을 밀고 지나가고, 거꾸로 흐르려 하면 문이 닫힙니다. 전기도 조작도 필요 없습니다.<br>펌프 토출측에 반드시 설치하며, 설치 순서는 펌프→플렉시블→체크밸브→게이트밸브 순입니다(게이트를 닫고 체크밸브 정비 가능).<br>수평 배관: 스윙형, 수직 배관: 리프트형을 사용합니다.`,
     tip:'펌프 정지 시 역류에 의한 수격(워터해머)을 방지합니다. 토출측 체크밸브는 펌프 임펠러 보호에도 중요합니다.'},
    {icon:'⊕',color:SC.lcv,badge:'수위제어',title:'수위조절밸브 (LCV/정수위밸브)',svg:gdLCV(),
     body:`<strong>원리</strong> : 변기 물탱크와 같은 원리 — 수위가 만수위에 닿으면 볼탭·파일럿의 신호로 상수 인입 밸브가 스스로 닫힙니다.<br>저수조 수위가 만수위에 도달하면 인입수를 자동 차단합니다.<br>전동식(LCV) 또는 파일럿 볼탭식(정수위밸브)을 사용합니다.<br>고장 대비로 기계식 볼탭을 2차 백업으로 두고, LCV 전·후 차단 게이트밸브(교체 시 격리용)와 바이패스 배관(게이트밸브 1개, 평상시 닫힘)을 함께 설치합니다.<br>LCV 전단에는 Y형 스트레이너를 두어 파일럿 오리피스 막힘(→ 월류 사고)을 방지합니다.`,
     tip:'LCV 고장은 저수조 월류(넘침) 사고로 직결됩니다. 볼탭 백업과 오버플로우관 상태를 정기 점검하세요.'},
    {icon:'◇',color:SC.prv,badge:'감압',title:'감압밸브 (PRV)',svg:gdPRV(),
     body:`<strong>원리</strong> : 스프링과 다이어프램의 힘겨루기 — 2차측 압력이 스프링 설정값보다 오르면 밸브가 조여지고, 낮아지면 열려서 2차압이 항상 일정하게 유지됩니다.<br>1차 고압을 2차 설정압으로 자동 감압합니다.<br>저층부 과압 방지를 위해 설치하며, 반드시 바이패스 배관을 함께 설치합니다.<br>전후 게이트밸브 + 바이패스 글로브밸브를 세트로 구성합니다.`,
     tip:`설정압(현재 ${S.building.prvPressure}kgf/cm²)은 적정 급수압(${S.building.targetPressure}kgf/cm²) 이하로 설정합니다. 감압비가 3:1을 초과하면 소음·캐비테이션 우려가 있어 2단 감압을 검토하세요. 바이패스는 PRV 점검·교체 시 단수 없이 급수 유지를 위한 것입니다.`},
    {icon:'○',color:SC.globe,badge:'유량조절',title:'글로브밸브',svg:gdGlobe(),
     body:`<strong>원리</strong> : 수도꼭지와 같은 구조 — 핸들을 돌려 디스크를 조금씩 내리면 틈새 크기가 변하며 유량이 조절됩니다.<br>유량의 미세 조절이 가능합니다.<br>감압밸브 바이패스 배관에서 수동 압력 조절용으로 사용합니다.<br>유체 저항이 커서 메인 배관에는 사용하지 않습니다.`,
     tip:'바이패스 운전 시 서서히 열어 하류 압력을 확인하면서 조절하세요. 급격한 개방은 하류 배관에 충격을 줄 수 있습니다.'},
    {icon:'Y',color:SC.st,badge:'이물질포집',title:'Y형 스트레이너 (ST)',svg:gdST(),
     body:`<strong>원리</strong> : 배관 속의 체(거름망) — 물은 망을 통과시키고, 모래·쇳가루 같은 이물질은 Y자 주머니에 가둡니다.<br>이물질을 포집하여 펌프 임펠러와 밸브 시트를 보호합니다.<br>펌프 흡입측 직전에 반드시 설치합니다.<br>정기적인 청소(플러싱)가 필요합니다.`,
     tip:'청소구 방향이 아래를 향하도록 설치해야 청소가 용이합니다. 이물질 누적 시 흡입 저항 증가로 펌프 효율이 저하됩니다.'},
    {icon:'↑',color:SC.av,badge:'공기배출',title:'공기빼기밸브 (AV)',svg:gdAV(),
     body:`<strong>원리</strong> : 챔버에 공기가 차면 물에 떠 있던 플로트가 내려가 배출구가 열리고, 물이 다시 차오르면 플로트가 떠올라 닫힙니다.<br>배관 내 공기를 자동으로 배출합니다.<br>메인관 최고점 및 각 계통 최상부에 설치합니다.<br>자동식(플로트형)을 사용하여 공기 고임을 방지합니다.`,
     tip:'공기 고임은 유량 감소, 이상 소음, 배관 부식의 원인입니다. 공기빼기밸브 설치 위치가 배관 최고점인지 반드시 확인하세요.'},
    {icon:'⌁',color:SC.wh,badge:'수격흡수',title:'수격방지기 (WH)',svg:gdWH(),
     body:`<strong>원리</strong> : 배관용 에어백 — 물은 압축되지 않아 급정거하면 압력이 튀는데, 캡슐 속 공기가 피스톤 너머에서 눌리며 그 충격을 대신 먹어줍니다.<br>펌프 기동·정지 시 발생하는 수격(워터해머)을 흡수합니다.<br>펌프 토출 헤더에 설치합니다.<br>내부 질소 가스로 충격을 완충합니다.<br>※ 기구용 소형 수격방지기(WHA)는 이것과 별개입니다 — 세정밸브식 화장실의 급수 분기 말단마다 설치하며, 아래 '화장실 말단 밸브 체크리스트' 참조.`,
     tip:'1~2년마다 질소 재충전이 필요합니다. 충전 압력이 낮아지면 수격 흡수 성능이 저하됩니다.'},
    {icon:'✓',color:SC.prv,badge:'체크리스트',title:'화장실 말단 밸브 체크리스트',svg:gdWC(),
     body:`화장실 세부(기구 구성·온수기 유무)가 정해진 뒤 챙기는 항목들입니다. <strong style="color:var(--warn)">본 앱의 수량 산출에는 포함되지 않으므로</strong> 실시설계·발주 시 빠뜨리지 마세요.<br><br>
       <strong style="color:var(--text)">① 소형 수격방지기(WHA)</strong><br>
       · 세정밸브(플러시밸브)·전자밸브식 화장실의 급수 분기 말단마다 1개.<br>
       · 펌프실 수격방지기(펌프 기동·정지용)와 별개 — 기구의 급속 폐쇄 충격은 기구 근처에서 잡습니다.<br>
       · 없으면 물 내릴 때마다 '쿵' 소음이 나고, 반복되면 이음부 피로 파손 → 누수.<br><br>
       <strong style="color:var(--text)">② 전기온수기 주변</strong><br>
       · 설치 순서(냉수측): 냉수 배관 → 차단밸브(앵글/볼) → 체크밸브 → 온수기 입구.<br>
       · 체크밸브는 온수기 내 팽창수가 냉수 배관으로 역류(옆 기구에서 뜨거운 물이 나오는 현상)하는 것을 방지합니다.<br>
       · 온수 출구측에도 차단밸브를 두면 점검이 편합니다(권장).<br>
       · 온수기 부속 T&P 릴리프밸브(과온·과압 안전변)는 배수 연결을 반드시 확보.<br><br>

       · 세면기 1개당 2개(냉·온, 냉수만이면 1개) / 양변기 1개 / 소변기 1개.<br>
       · 기구 하나 수리할 때 화장실 전체를 잠그지 않기 위한 최소 차단 단위입니다.<br><br>

       · 배관이 음압이 될 때 구정물이 급수관으로 빨려 들어가는 역사이펀 오염을 방지합니다.`,
     tip:'기구 구성(세정밸브식 여부, 온수기 유무, 기구 수)은 위생기구 설계에서 정해지므로, 이 항목들의 자동 수량 산출은 급수앱(위생배관 관경 계산)에 기구 기반으로 추가하는 것이 정확합니다 — 추후 연동 시 반영 예정.'},
    {icon:'◍',color:SC.pg,badge:'압력안정',title:'압력탱크 (PT)',svg:gdPT(),
     body:`<strong>원리</strong> : 물 저금통 — 조금 쓸 때는 탱크가 저장한 물을 내주고, 펌프는 모아서 한 번에 채웁니다. 다이어프램 위 질소가 눌렸다 펴지며 압력을 유지합니다.<br>토출 헤더에 설치하여 소유량 사용 시 펌프의 빈번한 기동·정지를 방지합니다.<br>다이어프램(질소 충전)식이 표준입니다.<br>인버터 부스터펌프에도 소형 압력탱크는 기본 구성입니다.`,
     tip:'충전압은 펌프 기동압보다 약 0.2kgf/cm² 낮게 설정합니다. 다이어프램 파손 시 펌프가 헌팅(짧은 주기 반복 기동)합니다.'},
    {icon:'≈',color:SC.fj,badge:'진동차단',title:'플렉시블조인트 (FJ)',svg:gdFJ(),
     body:`<strong>원리</strong> : 배관 중간의 주름관(벨로우즈)이 펌프의 떨림을 그 자리에서 흡수해 뒤쪽 배관으로 전달하지 않습니다.<br>펌프 진동과 소음의 건물 구조 전달을 차단합니다.<br>펌프 흡입·토출 연결부 양쪽에 각 1개씩 설치합니다.<br>고온 배관에는 스테인리스 벨로우즈 타입을 사용합니다.`,
     tip:'설치 방향을 반드시 확인하세요. 잘못된 방향은 진동 차단 효과가 없습니다. 고압 배관에서는 내압 사양을 확인하세요.'},
    {icon:'~',color:SC.ex,badge:'열팽창흡수',title:'신축이음 (EX)',svg:gdEX(),
     body:`<strong>원리</strong> : 아코디언 주름 — 배관이 온도로 늘어나고 줄어드는 만큼 주름부가 접혔다 펴지며 받아줍니다.<br>배관의 열팽창 및 수축을 흡수합니다.<br>수직관 3층마다 1개씩 설치합니다 (총 ${Math.ceil(S.building.floors/3)}개).<br>벨로우즈형이 일반적이며, 급탕관에는 더 자주 설치합니다.`,
     tip:`본 건물(${S.building.floors}층)의 신축이음은 ${Math.ceil(S.building.floors/3)}개가 필요합니다. 설치 위치는 고정 브래킷과 가이드 서포트를 함께 고려해야 합니다.`},
  ];

  let h='';
  for(const g of guides){
    h+=`<div class="guide-card">
      <div class="guide-hdr" onclick="toggleGuide(this)">
        <div class="guide-icon" style="background:${g.color}22;border:1px solid ${g.color}66">
          <span style="color:${g.color}">${g.icon}</span>
        </div>
        <span class="guide-title">${g.title}</span>
        <span class="guide-badge" style="background:${g.color}22;color:${g.color};border:1px solid ${g.color}55">${g.badge}</span>
        <span class="ml" style="color:var(--text2);font-size:12px">▼</span>
      </div>
      <div class="guide-body">
        ${g.svg||''}
        <p>${g.body}</p>
        <div class="guide-tip"><strong>실무 팁 :</strong> ${g.tip}</div>
      </div>

  }
  document.getElementById('guidePanel').innerHTML=`<div class="page">${h}</div>`;
}
function toggleGuide(el){
  const body=el.nextElementSibling;
  const arr=el.querySelector('.ml');
  body.classList.toggle('open');
  if(arr) arr.textContent=body.classList.contains('open')?'▲':'▼';
}

// ── Actions ───────────────────────────────────────────────────────────────────
function setSystem(v){S.system=v;renderAll();}
function setMaterial(v){S.material=v;renderAll();}

// ── 엑셀(CSV) 내보내기 ────────────────────────────────────────────────────────
function exportCSV(){
  S.projectName=document.getElementById('projectName').value||S.projectName;
  const {list,summary}=calcValves();
  const rows=[];
  rows.push([S.projectName+' — 밸브 목록',
    (S.system==='booster'?'부스터펌프식':'고가수조식'),
    `${S.building.floors}층`, '출력일 '+new Date().toISOString().slice(0,10)]);
  rows.push([]);
  rows.push(['No.','설치 위치','기기명','규격','재질/등급','구경','수량','비고']);
  for(const i of list) rows.push([i.no,i.pos,i.name,i.spec,i.mat||'',i.pipe,i.qty,i.note]);
  // 기계실 물량 (개산)
  const mr=calcMR();
  if(mr.items.length){
    const spec=pipeSpecLabel();
    rows.push([]);
    rows.push(['[기계실 물량(개산)]','품명','규격','구경','수량','단위','비고']);
    for(const it of mr.items) rows.push(['배관','강관',spec,it.pipe,it.len,'m',it.name+(it.note?' · '+it.note:'')]);
    for(const it of mr.items) if(it.elbow) rows.push(['부속','엘보 90°',spec,it.pipe,it.elbow,'개',`${it.len}m×${mr.eK}개/m 개산`]);
    for(const it of mr.items) if(it.tee) rows.push(['부속','티',spec,it.pipe,it.tee,'개',`${it.len}m×${mr.tK}개/m 개산`]);
    if(mr.reducer) rows.push(['부속','레듀서',spec,S.pump.pumpPipe||'65A',mr.reducer,'개','펌프 접속부 ×2/대']);
    if(mr.insul!=='보온 없음') for(const it of mr.items) rows.push(['보온','배관 보온',mr.insul,it.pipe,it.len,'m','결로방지 — '+it.name]);
  }

  rows.push([]);
  rows.push(['[집계]','기기명','수량 합계','구경별']);
  const byPipe={};
  for(const i of list){const m=byPipe[i.name]=byPipe[i.name]||{};m[i.pipe]=(m[i.pipe]||0)+i.qty;}
  for(const [n,q] of Object.entries(summary)){
    if(!q) continue;
    const detail=Object.keys(byPipe[n]||{}).sort((a,b)=>PIPES.indexOf(a)-PIPES.indexOf(b))
      .map(p=>`${p}×${byPipe[n][p]}`).join(' / ');
    rows.push(['',n,q,detail]);
  }
  // BOM을 붙여 한글이 엑셀에서 깨지지 않게 함
  const csv=String.fromCharCode(0xFEFF)+rows.map(r=>r.map(c=>`"${String(c??'').replace(/"/g,'""')}"`).join(',')).join('\r\n');
  const url=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
  const a=document.createElement('a');
  a.href=url; a.download=(S.projectName||'프로젝트')+'_밸브목록.csv'; a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}
// 숫자 입력 검증: NaN·범위 초과 방지
function clampNum(v,min,max,fb){v=+v;if(!isFinite(v))return fb;return Math.min(max,Math.max(min,v));}
const NUM_RULES={
  pump:{count:[1,3,2],pressure:[0.1,30,7],flow:[1,100000,300],mrLen:[0,300,8]},
  building:{floors:[1,120,5],floorHeight:[2,10,3.5],targetPressure:[0.5,10,3],prvPressure:[0.5,10,2.5],tankHeight:[0,30,3]}
};
function setPump(k,v){
  const r=NUM_RULES.pump[k];
  if(r)v=clampNum(v,r[0],r[1],r[2]);
  S.pump[k]=v;renderAll();
}
function setBuilding(k,v){
  const r=NUM_RULES.building[k];
  if(r)v=clampNum(v,r[0],r[1],r[2]);
  if(k==='floors')v=Math.round(v);
  S.building[k]=v;renderAll();
}

function addGroup(){
  S.groups.push({id:uid(),name:`입상관 ${S.groups.length+1}`,pipe:'65A',prv:false,floorPipes:[],zones:[]});
  renderAll();
}
function delGroup(id){
  if(!confirm('입상관을 삭제하시겠습니까?')) return;
  S.groups=S.groups.filter(g=>g.id!==id); renderAll();
}
function setGroupName(id,v){const g=S.groups.find(g=>g.id===id);if(g){g.name=v;persist();}}
function setGroupVal(id,k,v){const g=S.groups.find(g=>g.id===id);if(g){g[k]=v;renderAll();}}
function addZone(gid){
  const g=S.groups.find(g=>g.id===gid);if(!g)return;
  g.zones.push({name:`Zone ${g.zones.length+1}`,pipe:'40A'});renderAll();
}
function delZone(gid,idx){
  const g=S.groups.find(g=>g.id===gid);if(!g)return;
  g.zones.splice(idx,1);renderAll();
}
function setZoneProp(gid,idx,k,v){
  const g=S.groups.find(g=>g.id===gid);if(!g)return;
  g.zones[idx][k]=v;persist();
}
function addFloorPipe(gid){
  const g=S.groups.find(g=>g.id===gid);if(!g)return;
  if(!g.floorPipes)g.floorPipes=[];
  g.floorPipes.push({id:uid(),floorNo:g.floorPipes.length+1,pipe:'65A',qty:1});renderAll();
}
function delFloorPipe(gid,idx){
  const g=S.groups.find(g=>g.id===gid);if(!g)return;
  g.floorPipes.splice(idx,1);renderAll();
}
function setFloorPipeProp(gid,idx,k,v){
  const g=S.groups.find(g=>g.id===gid);if(!g)return;
  g.floorPipes[idx][k]=v;renderAll();
}
function resetAll(){
  if(!confirm('모든 설정을 초기화하시겠습니까?')) return;
  S.projectName='새 프로젝트'; S.system='booster'; S.material='sts';
  S.mr=mrDefaults();
  S.pump={count:2,pressure:7,flow:300,mainPipe:'100A',pumpPipe:'65A',inletPipe:'50A',mrLen:8};
  S.building={floors:5,floorHeight:3.5,targetPressure:3.0,prvPressure:2.5,tankHeight:3};
  S.groups=[]; _id=1;
  try{localStorage.removeItem(LS_KEY);}catch{}
  document.getElementById('projectName').value='새 프로젝트';
  renderAll();
}

// ── Save / Load ───────────────────────────────────────────────────────────────
function saveJSON(){
  S.projectName=document.getElementById('projectName').value||S.projectName;
  const url=URL.createObjectURL(new Blob([JSON.stringify(S,null,2)],{type:'application/json'}));
  const a=document.createElement('a');
  a.href=url;
  a.download=(S.projectName||'프로젝트')+'_밸브.json'; a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}
function loadJSON(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      Object.assign(S,JSON.parse(ev.target.result));
      if(S.building.tankHeight==null)S.building.tankHeight=3;
      if(!S.pump.pumpPipe)S.pump.pumpPipe='65A';
      if(!S.pump.inletPipe)S.pump.inletPipe='50A';
      if(!S.material)S.material='sts';
      S.mr=Object.assign(mrDefaults(),S.mr||{});
      if(S.pump.mrLen==null)S.pump.mrLen=8;
      let mx=0;
      (S.groups||[]).forEach(g=>{const n=parseInt(g.id?.slice(1));if(n>mx)mx=n;});
      _id=mx+1;
      document.getElementById('projectName').value=S.projectName||'';
      renderAll();
    }catch{alert('JSON 파일 형식이 올바르지 않습니다.');}
  };
  r.readAsText(f); e.target.value='';
}
function loadWaterApp(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      const cwGroups=d.cw?.groups||[];
      const zones=d.zones||[];
      S.groups=cwGroups.map(cg=>{
        const zoneObjs=(cg.zoneIds||[]).map(zid=>{
          const z=zones.find(z=>z.id===zid);
          return z?{name:z.name,pipe:'40A'}:{name:zid,pipe:'40A'};
        });
        return {id:uid(),name:cg.name||'그룹',pipe:'65A',prv:false,floorPipes:[],zones:zoneObjs};
      });
      renderAll();
      alert(`급수앱 데이터 연동 완료.\n그룹 ${S.groups.length}개, Zone ${S.groups.reduce((s,g)=>s+g.zones.length,0)}개 불러왔습니다.\n유량·관경은 직접 확인 후 수정하세요.`);
    }catch{alert('급수앱 JSON 형식이 올바르지 않습니다.');}
  };
  r.readAsText(f); e.target.value='';
}

// ── Print: 전 탭 라이트 테마 렌더 → 인쇄 후 복원 ─────────────────────────────
window.addEventListener('beforeprint',()=>{
  TH=THEMES.light;SC=TH.sc;
  document.getElementById('printHeader').innerHTML=
    `<div style="font-size:20px;font-weight:700;margin-bottom:4px;color:#1f2328">${esc(S.projectName||'프로젝트')} — 밸브 계통도 계산서</div>
     <div style="font-size:12px;color:#57606a">${S.system==='booster'?'부스터펌프식':'고가수조식'} · ${S.building.floors}층 (층고 ${S.building.floorHeight}m) · 출력일 ${new Date().toISOString().slice(0,10)}</div>`;
  renderSettings();renderDiagram();renderValveList();renderGuide();
});
window.addEventListener('afterprint',()=>{
  TH=THEMES.dark;SC=TH.sc;
  renderSettings();renderDiagram();renderValveList();renderGuide();
});

// ── Init ─────────────────────────────────────────────────────────────────────
document.getElementById('projectName').addEventListener('change',function(){S.projectName=this.value;persist();});
let hadSaved=false;
try{
  const saved=localStorage.getItem(LS_KEY);
  if(saved){
    const d=JSON.parse(saved);
    if(d&&d.pump&&d.building){
      Object.assign(S,d);
      if(S.building.tankHeight==null)S.building.tankHeight=3;
      if(!S.pump.pumpPipe)S.pump.pumpPipe='65A';
      if(!S.pump.inletPipe)S.pump.inletPipe='50A';
      if(!S.material)S.material='sts';
      S.mr=Object.assign(mrDefaults(),S.mr||{});
      if(S.pump.mrLen==null)S.pump.mrLen=8;
      let mx=0;
      (S.groups||[]).forEach(g=>{const n=parseInt((g.id||'').slice(1));if(n>mx)mx=n;});
      _id=mx+1;
      hadSaved=true;
    }
  }
}catch{}
document.getElementById('projectName').value=S.projectName||'';
// 처음 방문자는 사용법 탭, 작업하던 사용자는 계통 설정 탭으로
switchTab(hadSaved?1:0);
</script>
